<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenCom Controller</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
            background: #334155;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .status-badge.running {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .status-badge.stopped {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            background: #334155;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn.start {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .btn.stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .warning {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>VenCom Link</h1>
        
        <div class="input-group">
            <label>Daemon URL (e.g. http://192.168.1.5:8001)</label>
            <input type="text" id="daemon-url" placeholder="http://192.168.1.X:8001" onchange="saveUrl()">
        </div>

        <div id="status-badge" class="status-badge">Checking Connection...</div>

        <button id="action-btn" class="btn" onclick="toggleServer()" disabled>Connecting...</button>

        <div class="warning">
            <strong>Note on GitHub Pages:</strong> If hosted on HTTPS (like github.io), browsers block requests to local HTTP IPs (Mixed Content). To fix this, click the lock icon in your URL bar -> Site Settings -> allow "Insecure Content".
        </div>
    </div>

    <script>
        let isRunning = false;
        let isConnected = false;

        const urlInput = document.getElementById('daemon-url');
        const badge = document.getElementById('status-badge');
        const btn = document.getElementById('action-btn');

        // Load saved URL
        if (localStorage.getItem('vencomDaemonUrl')) {
            urlInput.value = localStorage.getItem('vencomDaemonUrl');
        }

        function saveUrl() {
            let url = urlInput.value.trim();
            if (url.endsWith('/')) url = url.slice(0, -1);
            localStorage.setItem('vencomDaemonUrl', url);
            fetchStatus();
        }

        async function fetchStatus() {
            const url = localStorage.getItem('vencomDaemonUrl');
            if (!url) {
                badge.className = 'status-badge';
                badge.textContent = 'Enter URL above';
                btn.disabled = true;
                btn.className = 'btn';
                btn.textContent = 'Waiting for URL...';
                return;
            }

            try {
                const res = await fetch(`${url}/status`);
                const data = await res.json();
                
                isRunning = data.status === 'running';
                isConnected = true;

                badge.textContent = isRunning ? '● Server Running' : '○ Server Stopped';
                badge.className = isRunning ? 'status-badge running' : 'status-badge stopped';
                
                btn.disabled = false;
                btn.textContent = isRunning ? 'Stop VenCom' : 'Start VenCom';
                btn.className = isRunning ? 'btn stop' : 'btn start';

            } catch(e) {
                isConnected = false;
                badge.className = 'status-badge';
                badge.textContent = 'Disconnected';
                btn.disabled = true;
                btn.className = 'btn';
                btn.textContent = 'Cannot Connect';
            }
        }

        async function toggleServer() {
            if (!isConnected) return;
            const url = localStorage.getItem('vencomDaemonUrl');
            
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                await fetch(`${url}${isRunning ? '/stop' : '/start'}`, { method: 'POST' });
            } catch (e) {
                console.error(e);
            }
            
            setTimeout(fetchStatus, 1000);
        }

        // Poll every 3 seconds
        setInterval(fetchStatus, 3000);
        saveUrl(); // Initial fetch
    </script>
</body>
</html>
